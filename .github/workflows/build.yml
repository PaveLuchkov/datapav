name: Build Windows portable

on:
  push:
    tags:
      - 'v*'          # запускается при git tag v1.0.0 и push
  workflow_dispatch:  # или вручную через кнопку на GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run electron:build

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: DataLoom-windows-portable
          path: dist/*.exe
          retention-days: 30
